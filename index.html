<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap');

  :root {
    --bg: #090d13;
    --panel: rgba(18, 24, 34, 0.82);
    --panel-strong: rgba(23, 31, 44, 0.94);
    --line: rgba(148, 163, 184, 0.18);
    --line-strong: rgba(148, 163, 184, 0.32);
    --text: #eef4ff;
    --muted: #91a0b8;
    --soft: #c5d0e3;
    --green: #35d07f;
    --red: #ff5d6c;
    --blue: #61a8ff;
    --gold: #f4c96b;
    --cyan: #68e1fd;
    --shadow: 0 18px 52px rgba(0, 0, 0, 0.34);
  }

  * { box-sizing: border-box; }
  html { min-width: 320px; }
  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
    background:
      radial-gradient(circle at 18% 0%, rgba(97, 168, 255, 0.20), transparent 28%),
      radial-gradient(circle at 84% 12%, rgba(244, 201, 107, 0.14), transparent 24%),
      linear-gradient(180deg, #090d13 0%, #0d1119 42%, #080b10 100%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
    background-size: 58px 58px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.74), transparent 76%);
  }

  .page {
    position: relative;
    width: min(1500px, 100%);
    margin: 0 auto;
    padding: 24px;
  }

  .terminal {
    overflow: hidden;
    min-height: calc(100vh - 48px);
    border: 1px solid var(--line);
    border-radius: 20px;
    background: rgba(7, 11, 17, 0.72);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
    background: rgba(9, 13, 19, 0.82);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }

  .brand-mark {
    width: 42px;
    height: 42px;
    flex: 0 0 auto;
    border: 1px solid rgba(97, 168, 255, 0.42);
    border-radius: 12px;
    background:
      linear-gradient(135deg, rgba(97, 168, 255, 0.25), rgba(53, 208, 127, 0.14)),
      #0f1724;
    display: grid;
    place-items: end center;
    padding: 9px;
  }

  .brand-mark span {
    width: 4px;
    border-radius: 99px;
    background: var(--blue);
    box-shadow: 8px -7px 0 var(--green), 16px -14px 0 var(--gold);
    height: 16px;
    display: block;
  }

  .brand-title {
    min-width: 0;
  }

  .brand-title h1 {
    margin: 0;
    font-family: Inter, sans-serif;
    font-size: clamp(1.35rem, 2vw, 2.15rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0;
  }

  .brand-title p {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 0.8rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .update-time {
    color: var(--soft);
    font-size: 0.8rem;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.035);
  }

  .refresh-btn {
    border: 0;
    border-radius: 999px;
    padding: 10px 18px;
    min-height: 40px;
    color: #061017;
    background: linear-gradient(135deg, var(--cyan), var(--green) 58%, var(--gold));
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 14px 28px rgba(53, 208, 127, 0.18);
  }

  .refresh-btn:hover { filter: brightness(1.07); }
  .refresh-btn.loading { opacity: 0.72; pointer-events: none; }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(340px, 0.75fr);
    gap: 18px;
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--line);
  }

  .hero-copy {
    min-height: 250px;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 26px;
    background:
      linear-gradient(135deg, rgba(97, 168, 255, 0.16), rgba(53, 208, 127, 0.06) 46%, rgba(244, 201, 107, 0.10)),
      rgba(13, 19, 29, 0.82);
    position: relative;
    overflow: hidden;
  }

  .hero-copy::after {
    content: "";
    position: absolute;
    right: -80px;
    bottom: -120px;
    width: 420px;
    height: 260px;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.10) 0 2px, transparent 2px 24px),
      linear-gradient(135deg, rgba(97,168,255,0.16), rgba(53,208,127,0.12));
    transform: rotate(-12deg);
    opacity: 0.55;
  }

  .eyebrow {
    margin: 0 0 18px;
    color: var(--cyan);
    font: 800 0.72rem Inter, sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero-copy h2 {
    position: relative;
    z-index: 1;
    margin: 0;
    max-width: 760px;
    font-family: Inter, sans-serif;
    font-size: clamp(1.3rem, 2vw, 2rem);
    line-height: 1.15;
    letter-spacing: 0;
  }

  .hero-news-list {
    position: relative;
    z-index: 1;
    display: grid;
    gap: 10px;
    margin-top: 18px;
  }

  .hero-news-item {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    gap: 12px;
    padding: 12px;
    border: 1px solid rgba(148, 163, 184, 0.16);
    border-radius: 12px;
    background: rgba(4, 9, 14, 0.34);
    text-decoration: none;
    color: var(--text);
  }

  .hero-news-rank {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: #061017;
    background: linear-gradient(135deg, var(--cyan), var(--green));
    font: 900 0.72rem Inter, sans-serif;
  }

  .hero-news-title {
    margin: 0;
    font-size: 0.9rem;
    font-weight: 850;
    line-height: 1.55;
  }

  .hero-news-source {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 800;
  }

  .hero-news-empty {
    position: relative;
    z-index: 1;
    margin-top: 18px;
    padding: 16px;
    border: 1px dashed var(--line-strong);
    border-radius: 12px;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.03);
  }

  .market-panel {
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(12, 18, 27, 0.86);
    padding: 18px;
  }

  .panel-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: var(--muted);
    font-size: 0.75rem;
    margin-bottom: 14px;
    text-transform: uppercase;
    font-weight: 800;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 16px rgba(53, 208, 127, 0.8);
  }

  .ticker {
    display: grid;
    gap: 10px;
  }

  .ticker-row {
    display: grid;
    grid-template-columns: minmax(74px, 1fr) auto auto;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border: 1px solid rgba(148, 163, 184, 0.14);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.035);
  }

  .ticker-name { color: var(--soft); font-size: 0.78rem; font-weight: 800; }
  .ticker-price { font: 800 1rem Inter, sans-serif; }
  .ticker-change { font: 800 0.76rem Inter, sans-serif; }
  .up { color: var(--green); }
  .down { color: var(--red); }

  .section {
    padding: 22px 20px 0;
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 16px;
    margin-bottom: 14px;
  }

  .section-title {
    margin: 0;
    font-family: Inter, sans-serif;
    font-size: 1.05rem;
    letter-spacing: 0;
  }

  .section-kicker {
    margin: 0;
    color: var(--muted);
    font-size: 0.78rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
    gap: 14px;
  }

  .card {
    min-height: 204px;
    position: relative;
    overflow: hidden;
    padding: 18px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--panel);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-top: 1px solid rgba(255, 255, 255, 0.12);
    pointer-events: none;
  }

  .card:hover { border-color: var(--line-strong); transform: translateY(-1px); }
  .card-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
  }

  .card-label {
    color: var(--soft);
    font-size: 0.78rem;
    font-weight: 900;
    line-height: 1.45;
    text-transform: uppercase;
  }

  .status-pill {
    flex: 0 0 auto;
    padding: 4px 8px;
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 999px;
    color: var(--muted);
    font-size: 0.68rem;
    font-weight: 800;
  }

  .status-pill.ok { color: var(--green); border-color: rgba(53, 208, 127, 0.28); }
  .status-pill.warn { color: var(--gold); border-color: rgba(244, 201, 107, 0.30); }

  .card-price {
    margin-top: 18px;
    font-family: Inter, sans-serif;
    font-size: clamp(1.65rem, 4.2vw, 2.45rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: 0;
  }

  .card-change {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-weight: 900;
    font-size: 0.88rem;
  }

  .card-note {
    margin-top: 14px;
    color: var(--muted);
    font-size: 0.75rem;
    line-height: 1.5;
  }

  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 14px;
    padding-bottom: 22px;
  }

  .news-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 214px;
    padding: 18px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--panel-strong);
  }

  .news-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 800;
  }

  .news-card h3 {
    margin: 0;
    font-size: 1rem;
    line-height: 1.65;
  }

  .news-card p {
    margin: 0;
    color: var(--muted);
    font-size: 0.84rem;
    line-height: 1.75;
  }

  .news-link {
    margin-top: auto;
    color: var(--cyan);
    font-size: 0.82rem;
    font-weight: 900;
    text-decoration: none;
  }

  .news-link:hover { text-decoration: underline; }

  .empty-state {
    grid-column: 1 / -1;
    padding: 24px;
    border: 1px dashed var(--line-strong);
    border-radius: 16px;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.03);
  }

  .footer {
    padding: 18px 20px 24px;
    color: var(--muted);
    font-size: 0.72rem;
    line-height: 1.7;
    border-top: 1px solid var(--line);
  }

  .footer p { margin: 0; }
  .footer p + p { margin-top: 4px; }

  @media (max-width: 860px) {
    .page { padding: 12px; }
    .terminal { border-radius: 16px; min-height: calc(100vh - 24px); }
    .topbar, .hero, .section, .footer { padding-left: 14px; padding-right: 14px; }
    .topbar { align-items: flex-start; }
    .hero { grid-template-columns: 1fr; }
    .hero-copy { min-height: 230px; padding: 20px; }
    .actions { width: 100%; justify-content: flex-start; }
    .update-time { width: 100%; }
    .refresh-btn { width: 100%; justify-content: center; }
  }

  @media (max-width: 520px) {
    .topbar { flex-direction: column; }
    .brand-title p { white-space: normal; }
    .ticker-row { grid-template-columns: 1fr auto; }
    .ticker-change { grid-column: 1 / -1; }
    .grid, .news-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<main class="page">

        </div>
      </div>
      <div class="actions">

        <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">更新</button>

    <section class="hero">

      <p>データ取得元: Yahoo Finance、CoinGecko、Frankfurter、三菱UFJ銀行CSV、RSS等。</p>
    </footer>
  </div>
</main>

function formatNumber(num, decimals) {
  return Number(num).toLocaleString('ja-JP', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[char]));
}

function getChange(asset) {
  const price = Number(asset.price);
  const prevPrice = Number(asset.prevPrice || asset.price);
  const change = price - prevPrice;
  const changePercent = prevPrice ? ((change / prevPrice) * 100) : 0;
  return { price, prevPrice, change, changePercent, isUp: change >= 0 };
}

function renderTicker() {
  const grid = document.getElementById('tickerGrid');
  const featured = ['usdjpy', 'btcusdt', 'xauusd', 'vix', 'nasdaq100']
    .map(id => ASSETS.find(asset => asset.id === id))
    .filter(Boolean);

  grid.innerHTML = featured.map(asset => {
    const c = getChange(asset);
    return `
      <div class="ticker-row">
        <span class="ticker-name">${escapeHtml(asset.label)}</span>
        <span class="ticker-price">${asset.prefix}${formatNumber(c.price, asset.decimals)}</span>
        <span class="ticker-change ${c.isUp ? 'up' : 'down'}">${c.isUp ? '+' : ''}${c.changePercent.toFixed(2)}%</span>
      </div>
    `;
  }).join('');
}

function renderPrices() {
  const grid = document.getElementById('priceGrid');
  grid.innerHTML = '';
  ASSETS.forEach(asset => {
    const c = getChange(asset);
    const card = document.createElement('div');
    const statusClass = asset.status === '取得成功' ? 'ok' : asset.status === '取得失敗' ? 'warn' : '';
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-label">${escapeHtml(asset.label)}</div>
        <div class="status-pill ${statusClass}">${escapeHtml(asset.status || '参考値')}</div>
      </div>
      <div class="card-price">${asset.prefix}${formatNumber(c.price, asset.decimals)} ${escapeHtml(asset.unit)}</div>
      <div class="card-change ${c.isUp ? 'up' : 'down'}">
        ${c.isUp ? '▲' : '▼'} ${c.isUp ? '+' : ''}${formatNumber(c.change, asset.decimals)} (${c.isUp ? '+' : ''}${c.changePercent.toFixed(2)}%)
      </div>
      <div class="card-note">${escapeHtml(asset.note)}</div>
    `;
    grid.appendChild(card);
  });
  renderTicker();
}

    <div class="news-card">
      <div class="news-meta">
        <span>TREND ${String(index + 1).padStart(2, '0')}</span>
        <span>${escapeHtml(item.source)}</span>
      </div>
      <h3>${escapeHtml(item.title)}</h3>

      <a class="news-link" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">Xの投稿を探す</a>
    </div>
  `).join('');

  if (NEWS_ITEMS.length === 0) {
    if (heroGrid) {
      heroGrid.innerHTML = '<div class="hero-news-empty">ニュースを取得できませんでした。</div>';

  if (heroGrid) {
    heroGrid.innerHTML = NEWS_ITEMS.slice(0, 3).map((item, index) => `
      <a class="hero-news-item" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">
        <span class="hero-news-rank">${index + 1}</span>
        <span>
          <span class="hero-news-title">${escapeHtml(item.title)}</span>
          <span class="hero-news-source">${escapeHtml(item.source)}</span>
        </span>
      </a>
    `).join('');
  }
}

function updateTimestamp() {
  const now = new Date();
  const opts = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: 'Asia/Tokyo' };
  document.getElementById('updateTime').textContent = '最終更新: ' + now.toLocaleString('ja-JP', opts) + ' (JST)';
}

    document.getElementById(gridId).innerHTML = X_TRENDS.slice(0, 3).map((item, index) => `
      <div class="news-card">
        <div class="news-meta">
          <span>TREND ${String(index + 1).padStart(2, '0')}</span>
          <span>${escapeHtml(item.source)}</span>
        </div>
        <h3>${escapeHtml(item.title)}</h3>
        <p>${escapeHtml(item.body)}</p>
        <a class="news-link" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">Xの投稿を探す</a>
      </div>
    `).join('');
  } else {
    document.getElementById(gridId).innerHTML =
      `<div class="empty-state">${label}を取得中...</div>`;

  if (gridId === 'newsGrid' && heroGrid) {

  }
}

function yahooRealtimeUrl(query) {
  return `https://search.yahoo.co.jp/realtime/search?p=${encodeURIComponent(query)}`;
}

function jinaReaderUrl(url) {
  return `https://r.jina.ai/http://r.jina.ai/http://${url.replace(/^https?:\/\//, '')}`;
}

function scoreRealtimeText(text) {
  const recentMentions = (text.match(/秒前|分前|時間前|たった今/g) || []).length;
  const investmentMentions = (text.match(/株|投資|市場|日経|NASDAQ|BTC|為替|NISA|金利|半導体/g) || []).length;
  return recentMentions * 4 + investmentMentions;
}

async function fetchXInvestmentTrends() {
  const results = await Promise.allSettled(X_TREND_CANDIDATES.map(async candidate => {
    const url = yahooRealtimeUrl(candidate.query);
    const readerUrl = jinaReaderUrl(url);
    const text = await fetchFirstText([
      `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(readerUrl)}`,
      readerUrl,
      `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url
    ], 10000);
    if (!text) return null;
    const score = scoreRealtimeText(stripHtml(text));
    return {
      title: candidate.title,
      body: `${candidate.body} 更新時点のリアルタイム検索で反応を確認しました。`,
      source: 'Yahoo!リアルタイム検索',
      url,
      score
    };
  }));

  const trends = results
    .filter(result => result.status === 'fulfilled' && result.value)
    .map(result => result.value)
    .sort((a, b) => b.score - a.score)
    .slice(0, 3);

  return trends.length > 0 ? trends : DEFAULT_X_TRENDS;
}

function withTimeout(url, options = {}, timeoutMs = 12000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(timer));
}

function proxyUrls(url) {
  const encoded = encodeURIComponent(url);
  return [
    `https://api.allorigins.win/raw?url=${encoded}`,
    `https://api.codetabs.com/v1/proxy?quest=${encoded}`,
    url
  ];
}

async function fetchFirstText(urls, timeoutMs = 12000) {
  for (const url of urls) {
    try {
      const res = await withTimeout(url, { cache: 'no-store' }, timeoutMs);
      if (!res.ok) continue;
      const text = await res.text();
      if (text && !/Cloudflare|Internal Server Error|Server-side requests are not allowed|欧州経済領域|EEA/i.test(text)) return text;
    } catch (e) {
      console.warn('Text fetch failed:', url, e);
    }
  }
  return null;
}

async function fetchFirstJson(urls, timeoutMs = 12000) {
  for (const url of urls) {
    try {
      const res = await withTimeout(url, { cache: 'no-store' }, timeoutMs);
      if (!res.ok) continue;
      const text = await res.text();
      if (!text || /Cloudflare|Internal Server Error|Server-side requests are not allowed|欧州経済領域|EEA/i.test(text)) continue;
      return JSON.parse(text);
    } catch (e) {
      console.warn('JSON fetch failed:', url, e);
    }
  }
  return null;
}

async function fetchCryptoPrice() {
  const coingecko = await fetchFirstJson([
    'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true'
  ]);
  const btc = coingecko?.bitcoin;
  if (btc?.usd) {
    const price = Number(btc.usd);
    const change = Number(btc.usd_24h_change || 0);
    return { price, prevPrice: price / (1 + change / 100), note: 'CoinGecko（24h）' };
  }

  const binance = await fetchFirstJson(['https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT']);
  if (binance?.lastPrice) {
    const price = Number(binance.lastPrice);
    return { price, prevPrice: price - Number(binance.priceChange || 0), note: 'Binance（24h）' };
  }
  return null;
}

async function fetchForexRate() {
  const frankfurter = await fetchFirstJson(['https://api.frankfurter.app/latest?from=USD&to=JPY']);
  if (frankfurter?.rates?.JPY) return { price: Number(frankfurter.rates.JPY), note: `Frankfurter ${frankfurter.date || ''}`.trim() };

  const exchangeRate = await fetchFirstJson(['https://api.exchangerate-api.com/v4/latest/USD']);
  if (exchangeRate?.rates?.JPY) return { price: Number(exchangeRate.rates.JPY), note: '為替レート' };
  return null;
}

async function fetchYahooFinance(symbol) {
  const encoded = encodeURIComponent(symbol);
  const url1 = `https://query1.finance.yahoo.com/v8/finance/chart/${encoded}?interval=1d&range=5d`;
  const url2 = `https://query2.finance.yahoo.com/v8/finance/chart/${encoded}?interval=1d&range=5d`;
  const data = await fetchFirstJson([...proxyUrls(url1), ...proxyUrls(url2)]);
  const result = data?.chart?.result?.[0];
  const meta = result?.meta;
  if (!meta) return null;

  const closes = (result.indicators?.quote?.[0]?.close || []).filter(v => Number.isFinite(Number(v)));
  const price = Number(meta.regularMarketPrice ?? closes.at(-1));
  const prevPrice = Number(meta.previousClose ?? meta.chartPreviousClose ?? closes.at(-2) ?? price);
  if (!Number.isFinite(price) || price <= 0) return null;
  return { price, prevPrice };
}

function parseFundCsv(csvText) {
  const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
  const rows = lines
    .map(line => line.split(',').map(cell => cell.replace(/^"|"$/g, '').trim()))
    .filter(cols => /^\d{4}-\d{2}-\d{2}$/.test(cols[0]) && Number(cols[1]) > 0);
  if (rows.length === 0) return null;
  const latest = rows[0];
  const previous = rows[1] || rows[0];
  return { price: Number(latest[1]), prevPrice: Number(previous[1]), date: latest[0] };
}

async function fetchFundNAV(fundId) {
  const csvUrl = FUND_CSV[fundId];
  const csv = await fetchFirstText([
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(csvUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(csvUrl)}`,
    csvUrl
  ], 15000);
  if (!csv) return null;
  return parseFundCsv(csv);
}

async function fetchYahooJapanFundQuote(symbol) {
  const url = `https://finance.yahoo.co.jp/quote/${encodeURIComponent(symbol)}`;
  const html = await fetchFirstText(proxyUrls(url), 15000);
  if (!html) return null;

  const text = stripHtml(html).replace(/\s+/g, ' ');
  const priceMatch = text.match(/([0-9,]{4,})\s+前日比\s*([+\-]?[0-9,]+)/);
  if (!priceMatch) return null;

  const price = Number(priceMatch[1].replace(/,/g, ''));
  const change = Number(priceMatch[2].replace(/,/g, ''));
  if (!Number.isFinite(price) || !Number.isFinite(change)) return null;

  const date = text.match(/\*\s*([0-9]{2}\/[0-9]{2})/)?.[1];
  return {
    price,
    prevPrice: price - change,
    date
  };
}

function decodeHtmlEntities(str) {
  const textarea = document.createElement('textarea');
  textarea.innerHTML = str || '';
  return textarea.value;
}

function stripHtml(str) {
  return decodeHtmlEntities(String(str || '').replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim());
}

function isInvestmentRelated(title, description) {
  const text = `${title} ${description}`.toLowerCase();
  return INVESTMENT_KEYWORDS.some(kw => text.includes(kw.toLowerCase()));
}

function isEnglishText(text) {
  const letters = String(text || '').replace(/\s/g, '');
  if (letters.length === 0) return false;
  const asciiLetters = letters.split('').filter(c => c.charCodeAt(0) < 256).length;
  return asciiLetters / letters.length > 0.85;
}

function containsJapanese(text) {
  return /[\u3040-\u30ff\u3400-\u9fff]/.test(String(text || ''));
}

function fallbackJapaneseSummary(text) {
  const source = String(text || '').toLowerCase();
  const topics = [];
  if (/ferrari|electric vehicle|ev/.test(source)) topics.push('EV関連企業の発表や株価反応');
  if (/ecb|rate|interest|central bank|bank/.test(source)) topics.push('欧州の金利見通しや銀行セクター');
  if (/stock|shares|market|nasdaq|s&p|dow/.test(source)) topics.push('株式市場の動向');
  if (/oil|crude|gold|commodity/.test(source)) topics.push('資源価格の変動');
  if (/bitcoin|crypto|btc/.test(source)) topics.push('暗号資産市場');
  if (/tariff|trade|iran|war|geopolitical/.test(source)) topics.push('地政学・貿易リスク');
  if (topics.length === 0) topics.push('海外市場の投資関連ニュース');
  return `${topics.slice(0, 2).join('、')}についてのニュースです。詳細は元記事で確認してください。`;
}

async function translateToJapanese(text) {
  try {
    const res = await withTimeout(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ja`, {}, 8000);
    if (!res.ok) return text;
    const data = await res.json();
    return data?.responseData?.translatedText || text;
  } catch {
    return text;
  }
}

async function ensureJapaneseText(text) {
  if (!isEnglishText(text)) return text;
  const translated = await translateToJapanese(text);
  if (translated && containsJapanese(translated)) return translated;
  return fallbackJapaneseSummary(text);
}

function parseRssXml(xmlText, source) {
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  if (doc.querySelector('parsererror')) return [];
  return [...doc.querySelectorAll('item')].map(item => {
    const title = stripHtml(item.querySelector('title')?.textContent || '');
    const body = stripHtml(item.querySelector('description')?.textContent || '');
    return {
      title,
      body: body ? `${body.slice(0, 220)}...` : title,
      url: item.querySelector('link')?.textContent || source.url,
      source: source.label,
      pubDate: new Date(item.querySelector('pubDate')?.textContent || item.querySelector('dc\\:date')?.textContent || 0)
    };
  }).filter(item => item.title && item.url);
}

function parseRss2Json(data, source) {
  return (data?.items || []).map(item => ({
    title: stripHtml(item.title || ''),
    body: `${stripHtml(item.description || item.content || item.title || '').slice(0, 220)}...`,
    url: item.link || source.url,
    source: source.label,
    pubDate: item.pubDate ? new Date(item.pubDate) : new Date(0)
  })).filter(item => item.title && item.url);
}

function parseJinaMarkdown(markdown, source) {
  const matches = [...markdown.matchAll(/^### \[([^\]]+)\]\((https?:\/\/[^)]+)\)/gm)];
  return matches.map(match => ({
    title: stripHtml(match[1]),
    body: stripHtml(match[1]),
    url: match[2],
    source: source.label,
    pubDate: new Date(0)
  }));
}

async function fetchNewsSource(source) {
  const rss2jsonUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}`;
  const rssData = await fetchFirstJson([rss2jsonUrl], 12000);
  const rss2jsonItems = parseRss2Json(rssData, source);
  if (rss2jsonItems.length > 0) return rss2jsonItems;

  const xml = await fetchFirstText(proxyUrls(source.url), 12000);
  const xmlItems = xml ? parseRssXml(xml, source) : [];
  if (xmlItems.length > 0) return xmlItems;

  const jinaUrl = `https://r.jina.ai/http://r.jina.ai/http://${source.url.replace(/^https?:\/\//, '')}`;
  const markdown = await fetchFirstText([
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(jinaUrl)}`,
    jinaUrl
  ], 15000);
  return markdown ? parseJinaMarkdown(markdown, source) : [];
}

async function fetchLatestNews() {
  const rssSources = [
    { url: 'https://www.nhk.or.jp/rss/news/cat5.xml', label: 'NHK経済' },
    { url: 'https://news.yahoo.co.jp/rss/topics/business.xml', label: 'Yahoo!ニュース 経済' },
    { url: 'https://feeds.finance.yahoo.com/rss/2.0/headline?s=%5ENDX,%5EVIX,GC=F,CL=F,BTC-USD,JPY=X&region=US&lang=en-US', label: 'Yahoo Finance' },
    { url: 'https://www.cnbc.com/id/100003114/device/rss/rss.html', label: 'CNBC' }
  ];

  const results = await Promise.allSettled(rssSources.map(fetchNewsSource));
  const allItems = results
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value)
    .filter(item => isInvestmentRelated(item.title, item.body));

  if (allItems.length === 0) return null;

  allItems.sort((a, b) => b.pubDate - a.pubDate);
  const seen = new Set();
  const deduped = allItems.filter(item => {
    const key = item.title.replace(/\s+/g, '').slice(0, 36);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  const finalItems = deduped.slice(0, 5);
  await Promise.allSettled(finalItems.map(async item => {
    const [translatedTitle, translatedBody] = await Promise.all([
      ensureJapaneseText(item.title),
      ensureJapaneseText(item.body)
    ]);
    item.title = translatedTitle;
    item.body = translatedBody;
  }));
  return finalItems;
}

function applyAssetData(id, data, successNote, failNote) {
  const asset = ASSETS.find(a => a.id === id);
  if (!asset) return;
  if (data) {
    asset.price = data.price;
    asset.prevPrice = data.prevPrice ?? asset.prevPrice ?? data.price;
    asset.note = successNote(data);
    asset.status = '取得成功';
  } else {
    asset.note = failNote;
    asset.status = '取得失敗';
  }
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');

  try {
    const [
      btcData,
      forexData,
      fundWorldData,
      fundSP500Data,
      newsData,
      xTrendsData,
      yahooResults,
      yahooJpFundResults
    ] = await Promise.all([
      fetchCryptoPrice(),
      fetchForexRate(),
      fetchFundNAV('emaxis_world'),
      fetchFundNAV('emaxis_sp500'),
      fetchLatestNews(),
      fetchXInvestmentTrends(),
      Promise.allSettled(Object.entries(YAHOO_SYMBOLS).map(async ([id, symbol]) => [id, await fetchYahooFinance(symbol)])),
      Promise.allSettled(Object.entries(YAHOO_JP_FUND_QUOTES).map(async ([id, symbol]) => [id, symbol, await fetchYahooJapanFundQuote(symbol)]))
    ]);

    applyAssetData('btcusdt', btcData, data => `暗号資産（${data.note}）`, '暗号資産（取得失敗・参考値）');
    applyAssetData('usdjpy', forexData, data => data.note || '為替レート', '為替レート（取得失敗・参考値）');
    applyAssetData('emaxis_world', fundWorldData, data => `基準価額（三菱UFJ銀行CSV ${data.date}）`, '基準価額（取得失敗・参考値）');
    applyAssetData('emaxis_sp500', fundSP500Data, data => `基準価額（三菱UFJ銀行CSV ${data.date}）`, '基準価額（取得失敗・参考値）');

    yahooResults.forEach(result => {
      if (result.status !== 'fulfilled') return;
      const [id, data] = result.value;
      const notes = {
        xauusd: '金先物（Yahoo Finance）',
        vix: '恐怖指数（Yahoo Finance）',
        wti: 'WTI原油先物（Yahoo Finance）',
        nasdaq100: 'NASDAQ 100（Yahoo Finance）',
        sox: 'SOX指数（Yahoo Finance）',
        etf2244: '東証ETF（Yahoo Finance）'
      };
      applyAssetData(id, data, () => notes[id], `${notes[id] || '価格'}（取得失敗・参考値）`);
    });

    yahooJpFundResults.forEach(result => {
      if (result.status !== 'fulfilled') return;
      const [id, symbol, data] = result.value;
      applyAssetData(
        id,
        data,
        value => `基準価額（Yahoo!ファイナンス ${symbol}${value.date ? ` ${value.date}` : ''}）`,
        '基準価額（取得失敗・参考値）'
      );
    });

    NEWS_ITEMS = newsData || [];
    X_TRENDS = xTrendsData || DEFAULT_X_TRENDS;
  } catch (e) {
    console.warn('Refresh error:', e);
  }

  renderPrices();
  renderNews();
  updateTimestamp();
  btn.classList.remove('loading');
}

async function init() {
  renderPrices();
  showLoading('newsGrid', '最新ニュース');
  updateTimestamp();
  await refreshAll();
}
