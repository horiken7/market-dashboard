<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;

    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;

  .brand h1 {
    font-family: 'Inter', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent) 0%, #b388ff 50%, var(--gold) 100%);

    -webkit-text-fill-color: transparent;

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .update-time {
    color: var(--muted);
    font-size: 0.85rem;
  }
  .refresh-btn {
    background: linear-gradient(135deg, var(--accent) 0%, #b388ff 60%, var(--gold) 100%);
    color: #fff;
    border: none;
    padding: 9px 22px;
    border-radius: 50px;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 7px;
    box-shadow: 0 0 18px rgba(88,166,255,0.3), 0 2px 8px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }
  .refresh-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(255,255,255,0.12) 0%, transparent 55%);
    border-radius: inherit;
    pointer-events: none;
  }
  .refresh-btn:hover {
    box-shadow: 0 0 32px rgba(88,166,255,0.55), 0 4px 14px rgba(0,0,0,0.6);
    transform: translateY(-2px);
    filter: brightness(1.12);
  }
  .refresh-btn:active { transform: translateY(0); filter: brightness(1); }
  .refresh-btn.loading { opacity: 0.75; pointer-events: none; }
  .refresh-btn .spinner {
    display: none;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .refresh-btn.loading .spinner { display: inline-block; }
  .refresh-btn.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--accent); }
  .card-label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .card-price {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .card-change {
    font-size: 0.95rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-change.up { color: var(--green); }
  .card-change.down { color: var(--red); }
  .card-note {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
  }

  .section-title {
    font-size: 1.2rem;
    margin-bottom: 16px;
    padding-left: 12px;
    border-left: 3px solid var(--accent);
  }


  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  @media (max-width: 500px) {
    .news-grid { grid-template-columns: 1fr; }
  }
  .news-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .news-card h3 {
    font-size: 0.95rem;
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .news-card p {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .news-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .news-link:hover { opacity: 0.8; text-decoration: underline; }
  .news-link-source {
    color: var(--muted);
    font-size: 0.75rem;
    margin-left: 4px;
  }
  .news-tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .tag-news { background: rgba(88,166,255,0.15); color: var(--accent); }


  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 20px 0;
    border-top: 1px solid var(--border);
  }
</style>

function formatNumber(num, decimals) {
  return num.toLocaleString('ja-JP', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
}

function renderPrices() {
  const grid = document.getElementById('priceGrid');
  grid.innerHTML = '';
  ASSETS.forEach(asset => {
    const change = asset.price - asset.prevPrice;
    const changePercent = ((change / asset.prevPrice) * 100);
    const isUp = change >= 0;
    const arrow = isUp ? '▲' : '▼';
    const cls = isUp ? 'up' : 'down';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-label">${asset.label}</div>
      <div class="card-price">${asset.prefix}${formatNumber(asset.price, asset.decimals)} ${asset.unit}</div>
      <div class="card-change ${cls}">
        ${arrow} ${isUp ? '+' : ''}${formatNumber(change, asset.decimals)} (${isUp ? '+' : ''}${changePercent.toFixed(2)}%)
      </div>
      <div class="card-note">${asset.note}</div>
    `;
    grid.appendChild(card);
  });
}

}

async function fetchCryptoPrice(symbol) {
  try {
    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return {
      price: parseFloat(data.lastPrice),
      prevPrice: parseFloat(data.lastPrice) - parseFloat(data.priceChange)
    };
  } catch (e) {
    console.warn(`Failed to fetch ${symbol}:`, e);
    return null;
  }
}

async function fetchForexRate() {
  try {
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return data.rates.JPY;
  } catch (e) {
    console.warn('Failed to fetch forex:', e);
    return null;
  }
}

function decodeHtmlEntities(str) {
  return str
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .replace(/&quot;/g, '"')
    .replace(/&#39;/g, "'")
    .replace(/&nbsp;/g, ' ');
}

function stripHtml(str) {
  return decodeHtmlEntities(str.replace(/<[^>]*>/g, '').trim());
}

async function fetchFundNAV(fundCode) {
  const url = `https://finance.yahoo.co.jp/fund/detail/${fundCode}`;
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];
  for (const proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl);
      if (!res.ok) continue;
      const html = await res.text();

      // Try Next.js embedded JSON first (__NEXT_DATA__)
      const nextDataMatch = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
      if (nextDataMatch) {
        const d = JSON.parse(nextDataMatch[1]);
        const pp = d?.props?.pageProps;
        const nav = pp?.latestPrice?.value ?? pp?.price?.close ?? pp?.fundDetail?.latestNav ?? pp?.initialState?.fund?.nav;
        const prev = pp?.latestPrice?.previousValue ?? pp?.fundDetail?.previousNav;
        if (nav && Number(nav) > 0) return { price: Number(nav), prevPrice: prev ? Number(prev) : null };
      }

      // Fallback: regex for 基準価額 followed by price
      const m = html.match(/基準価額[\s\S]{0,300}?([1-9][0-9,]{3,})\s*円/);
      if (m) return { price: parseInt(m[1].replace(/,/g, '')), prevPrice: null };
    } catch (e) {
      console.warn(`fetchFundNAV(${fundCode}) attempt failed:`, e);
    }
  }
  return null;
}

async function fetchYahooFinance(symbol) {
  const baseUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=5d`;
  const attempts = [
    () => fetch(`https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=5d`, { headers: { Accept: 'application/json' } }),
    () => fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=5d`, { headers: { Accept: 'application/json' } }),
    () => fetch(`https://corsproxy.io/?${encodeURIComponent(baseUrl)}`),
    () => fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(baseUrl)}`),
  ];
  for (const attempt of attempts) {
    try {
      const res = await attempt();
      if (!res.ok) continue;
      const data = await res.json();
      const meta = data?.chart?.result?.[0]?.meta;
      if (!meta) continue;
      const price = meta.regularMarketPrice;
      const prevPrice = meta.previousClose ?? meta.chartPreviousClose ?? price;
      if (price && price > 0) return { price, prevPrice };
    } catch (e) {
      console.warn(`Yahoo Finance attempt failed (${symbol}):`, e);
    }
  }
  return null;
}

function isEnglishText(text) {
  const letters = text.replace(/\s/g, '');
  if (letters.length === 0) return false;
  const asciiLetters = letters.split('').filter(c => c.charCodeAt(0) < 256).length;
  return asciiLetters / letters.length > 0.85;
}

async function translateToJapanese(text) {
  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ja`);
    if (!res.ok) return text;
    const data = await res.json();
    if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
      return data.responseData.translatedText;
    }
    return text;
  } catch {
    return text;
  }
}

async function fetchLatestNews() {
  const rssSources = [
    { url: 'https://www.nhk.or.jp/rss/news/cat5.xml', label: 'NHK経済' },
    { url: 'https://news.yahoo.co.jp/rss/topics/business.xml', label: 'Yahoo!ニュース ビジネス' },
    { url: 'https://feeds.reuters.com/reuters/businessNews', label: 'Reuters' },
    { url: 'https://www.cnbc.com/id/100003114/device/rss/rss.html', label: 'CNBC' }
  ];

  const results = await Promise.allSettled(
    rssSources.map(async ({ url, label }) => {
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=10`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      if (data.status !== 'ok' || !data.items || data.items.length === 0) throw new Error('No items');
      return data.items.map(item => ({
        title: stripHtml(item.title || ''),
        body: stripHtml(item.description || item.content || '').slice(0, 220) + '…',
        url: item.link,
        source: label,
        pubDate: item.pubDate ? new Date(item.pubDate) : new Date(0)
      }));
    })
  );

  const allItems = results
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value)
    .filter(item => isInvestmentRelated(item.title, item.body));

  if (allItems.length === 0) return null;

  // Sort by date (newest first) and deduplicate by title similarity
  allItems.sort((a, b) => b.pubDate - a.pubDate);
  const seen = new Set();
  const deduped = allItems.filter(item => {
    const key = item.title.slice(0, 30);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  const finalItems = deduped.slice(0, 5);

  // 英語タイトルを日本語に翻訳
  await Promise.allSettled(finalItems.map(async item => {
    if (isEnglishText(item.title)) {
      item.title = await translateToJapanese(item.title);
    }
  }));

  return finalItems;
}

function isInvestmentRelated(keyword, description) {
  const text = (keyword + ' ' + description).toLowerCase();
  return INVESTMENT_KEYWORDS.some(kw => text.includes(kw.toLowerCase()));
}

      const a = ASSETS.find(a => a.id === id);
      if (data) { a.price = data.price; a.prevPrice = data.prevPrice; a.note = note; }
      else { a.note = a.note.replace('（リアルタイム）', '') + '（取得失敗・参考値）'; }
    });

    [
      { data: fundWorldData, id: 'emaxis_world' },
      { data: fundSP500Data, id: 'emaxis_sp500' },
    ].forEach(({ data, id }) => {
      const a = ASSETS.find(a => a.id === id);
      if (data) {
        a.price = data.price;
        if (data.prevPrice !== null) a.prevPrice = data.prevPrice;
        a.note = '基準価額（前営業日）';
      } else {
        a.note = '基準価額（取得失敗・参考値）';
      }
    });

    NEWS_ITEMS = newsData || [];
  } catch (e) {
    console.warn('Refresh error:', e);
  }

  renderPrices();
  renderNews();
  updateTimestamp();

  btn.classList.remove('loading');
}

function showLoading(gridId, label) {
  document.getElementById(gridId).innerHTML =
    `<div style="color:var(--muted);padding:20px;grid-column:1/-1;">📡 ${label}を取得中...</div>`;
}

async function init() {
  renderPrices();
  showLoading('newsGrid', '最新ニュース');
  updateTimestamp();
  await refreshAll();
}

init();
</script>
</body>
</html>
