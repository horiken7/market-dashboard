<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --accent: #58a6ff;
    --gold: #f0c040;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .brand h1 {
    font-family: 'Inter', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent) 0%, #b388ff 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .update-time {
    color: var(--muted);
    font-size: 0.85rem;
  }
  .refresh-btn {
    background: linear-gradient(135deg, #238636, #2ea043);
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .refresh-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .refresh-btn:active { transform: translateY(0); }
  .refresh-btn.loading { opacity: 0.7; pointer-events: none; }
  .refresh-btn .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .refresh-btn.loading .spinner { display: inline-block; }
  .refresh-btn.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--accent); }
  .card-label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .card-price {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .card-change {
    font-size: 0.95rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-change.up { color: var(--green); }
  .card-change.down { color: var(--red); }
  .card-note {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
  }

  .section-title {
    font-size: 1.2rem;
    margin-bottom: 16px;
    padding-left: 12px;
    border-left: 3px solid var(--accent);
  }
  .section-title.gold-border { border-left-color: var(--gold); }

  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  @media (max-width: 500px) {
    .news-grid { grid-template-columns: 1fr; }
  }
  .news-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .news-card h3 {
    font-size: 0.95rem;
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .news-card p {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .news-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .news-link:hover { opacity: 0.8; text-decoration: underline; }
  .news-link-source {
    color: var(--muted);
    font-size: 0.75rem;
    margin-left: 4px;
  }
  .news-tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .tag-news { background: rgba(88,166,255,0.15); color: var(--accent); }
  .tag-trend { background: rgba(240,192,64,0.15); color: var(--gold); }

  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 20px 0;
    border-top: 1px solid var(--border);
  }
</style>

function formatNumber(num, decimals) {
  return num.toLocaleString('ja-JP', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
}

function renderPrices() {
  const grid = document.getElementById('priceGrid');
  grid.innerHTML = '';
  ASSETS.forEach(asset => {
    const change = asset.price - asset.prevPrice;
    const changePercent = ((change / asset.prevPrice) * 100);
    const isUp = change >= 0;
    const arrow = isUp ? '▲' : '▼';
    const cls = isUp ? 'up' : 'down';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-label">${asset.label}</div>
      <div class="card-price">${asset.prefix}${formatNumber(asset.price, asset.decimals)} ${asset.unit}</div>
      <div class="card-change ${cls}">
        ${arrow} ${isUp ? '+' : ''}${formatNumber(change, asset.decimals)} (${isUp ? '+' : ''}${changePercent.toFixed(2)}%)
      </div>
      <div class="card-note">${asset.note}</div>
    `;
    grid.appendChild(card);
  });
}

}

async function fetchCryptoPrice(symbol) {
  try {
    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return {
      price: parseFloat(data.lastPrice),
      prevPrice: parseFloat(data.lastPrice) - parseFloat(data.priceChange)
    };
  } catch (e) {
    console.warn(`Failed to fetch ${symbol}:`, e);
    return null;
  }
}

async function fetchForexRate() {
  try {
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return data.rates.JPY;
  } catch (e) {
    console.warn('Failed to fetch forex:', e);
    return null;
  }
}

function decodeHtmlEntities(str) {
  return str
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .replace(/&quot;/g, '"')
    .replace(/&#39;/g, "'")
    .replace(/&nbsp;/g, ' ');
}

function stripHtml(str) {
  return decodeHtmlEntities(str.replace(/<[^>]*>/g, '').trim());
}

async function fetchFundNAV(fundCode) {
  try {
    const url = `https://finance.yahoo.co.jp/fund/detail/${fundCode}`;
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('Proxy error');
    const html = await res.text();

    // Try Next.js embedded JSON first (__NEXT_DATA__)
    const nextDataMatch = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
    if (nextDataMatch) {
      const d = JSON.parse(nextDataMatch[1]);
      const pp = d?.props?.pageProps;
      const nav = pp?.latestPrice?.value ?? pp?.price?.close ?? pp?.fundDetail?.latestNav ?? pp?.initialState?.fund?.nav;
      const prev = pp?.latestPrice?.previousValue ?? pp?.fundDetail?.previousNav;
      if (nav && Number(nav) > 0) return { price: Number(nav), prevPrice: prev ? Number(prev) : null };
    }

    // Fallback: regex for 基準価額 followed by price
    const m = html.match(/基準価額[\s\S]{0,300}?([1-9][0-9,]{3,})\s*円/);
    if (m) return { price: parseInt(m[1].replace(/,/g, '')), prevPrice: null };

    return null;
  } catch (e) {
    console.warn(`fetchFundNAV(${fundCode}) failed:`, e);
    return null;
  }
}

async function fetchYahooFinance(symbol) {
  try {
    const url = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=2d`;
    const res = await fetch(url, { headers: { Accept: 'application/json' } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const meta = data?.chart?.result?.[0]?.meta;
    if (!meta) throw new Error('No data');
    const price = meta.regularMarketPrice;
    const prevPrice = meta.previousClose ?? meta.chartPreviousClose ?? price;
    return { price, prevPrice };
  } catch (e) {
    console.warn(`Yahoo Finance fetch failed (${symbol}):`, e);
    return null;
  }
}

function isEnglishText(text) {
  const letters = text.replace(/\s/g, '');
  if (letters.length === 0) return false;
  const asciiLetters = letters.split('').filter(c => c.charCodeAt(0) < 256).length;
  return asciiLetters / letters.length > 0.85;
}

async function translateToJapanese(text) {
  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ja`);
    if (!res.ok) return text;
    const data = await res.json();
    if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
      return data.responseData.translatedText;
    }
    return text;
  } catch {
    return text;
  }
}

async function fetchLatestNews() {
  const rssSources = [
    { url: 'https://www.nhk.or.jp/rss/news/cat5.xml', label: 'NHK経済' },
    { url: 'https://news.yahoo.co.jp/rss/topics/business.xml', label: 'Yahoo!ニュース ビジネス' },
    { url: 'https://feeds.reuters.com/reuters/businessNews', label: 'Reuters' },
    { url: 'https://www.cnbc.com/id/100003114/device/rss/rss.html', label: 'CNBC' }
  ];

  const results = await Promise.allSettled(
    rssSources.map(async ({ url, label }) => {
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=10`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      if (data.status !== 'ok' || !data.items || data.items.length === 0) throw new Error('No items');
      return data.items.map(item => ({
        title: stripHtml(item.title || ''),
        body: stripHtml(item.description || item.content || '').slice(0, 220) + '…',
        url: item.link,
        source: label,
        pubDate: item.pubDate ? new Date(item.pubDate) : new Date(0)
      }));
    })
  );

  const allItems = results
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value)
    .filter(item => isInvestmentRelated(item.title, item.body));

  if (allItems.length === 0) return null;

  // Sort by date (newest first) and deduplicate by title similarity
  allItems.sort((a, b) => b.pubDate - a.pubDate);
  const seen = new Set();
  const deduped = allItems.filter(item => {
    const key = item.title.slice(0, 30);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  const finalItems = deduped.slice(0, 5);

  // 英語タイトルを日本語に翻訳
  await Promise.allSettled(finalItems.map(async item => {
    if (isEnglishText(item.title)) {
      item.title = await translateToJapanese(item.title);
    }
  }));

  return finalItems;
}

const INVESTMENT_KEYWORDS = [
  '株', '株価', '日経', 'ナスダック', 'S&P', 'NYSE', 'ETF', '投資', '投資信託', 'ファンド',
  '為替', '円安', '円高', 'ドル', 'ユーロ', '金利', '利上げ', '利下げ', 'FRB', '日銀',
  '金価格', '原油', '資源', 'インフレ', 'デフレ', 'GDP', '景気', '経済',
  '関税', '貿易', '輸出', '輸入', '半導体', 'AI株',
  'ビットコイン', 'Bitcoin', 'BTC', '仮想通貨', '暗号資産', '仮想', 'イーサリアム', 'ETH',
  '金融', '証券', '債券', '国債', '財政', 'NISA', 'iDeCo',
  'リセッション', '恐慌', 'バブル', '上場', 'IPO', 'M&A',
  'トランプ', '関税', '制裁', '地政学',
  'stock', 'market', 'crypto', 'bitcoin', 'inflation', 'fed', 'rate', 'gdp'
];

function isInvestmentRelated(keyword, description) {
  const text = (keyword + ' ' + description).toLowerCase();
  return INVESTMENT_KEYWORDS.some(kw => text.includes(kw.toLowerCase()));
}

// Trends用の厳しい判定: タイトル自体にキーワードがあるか、説明文に2つ以上のキーワードがある場合のみ通過
function isStronglyInvestmentRelated(title, description) {
  const titleText = title.toLowerCase();
  const descText = description.toLowerCase();
  const titleMatches = INVESTMENT_KEYWORDS.some(kw => titleText.includes(kw.toLowerCase()));
  if (titleMatches) return true;
  const descMatchCount = INVESTMENT_KEYWORDS.filter(kw => descText.includes(kw.toLowerCase())).length;
  return descMatchCount >= 2;
}

async function fetchLatestTrends() {
  // 複数のRSSプロキシとURLを試みる
  const rssUrls = [
    'https://trends.google.com/trending/rss?geo=JP',
    'https://trends.google.com/trends/trendingsearches/daily/rss?geo=JP'
  ];
  // type: 'json' = JSONレスポンス(rss2json/allorigins形式), 'raw' = 生XML
  const proxyConfigs = [
    { fn: (url) => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=20`, type: 'rss2json' },
    { fn: (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, type: 'allorigins' },
    { fn: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`, type: 'raw' },
    { fn: (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`, type: 'raw' },
  ];

  function parseXmlItems(xmlText) {
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, 'text/xml');
    const entries = Array.from(xml.querySelectorAll('item'));
    if (entries.length === 0) return null;
    return entries.map(el => ({
      title: el.querySelector('title')?.textContent || '',
      description: el.querySelector('description')?.textContent || ''
    }));
  }

  async function tryFetchRss(rssUrl, sourceLabel, mapFn) {
    for (const { fn, type } of proxyConfigs) {
      try {
        const apiUrl = fn(rssUrl);
        const res = await fetch(apiUrl);
        if (!res.ok) continue;

        let items = null;
        if (type === 'raw') {
          const text = await res.text();
          items = parseXmlItems(text);
        } else {
          const raw = await res.json();
          if (type === 'rss2json' && raw.status === 'ok' && raw.items && raw.items.length > 0) {
            items = raw.items;
          } else if (type === 'allorigins' && raw.contents) {
            items = parseXmlItems(raw.contents);
          }
        }

        if (!items || items.length === 0) continue;
        return mapFn(items, sourceLabel);
      } catch (e) {
        console.warn('Trend fetch attempt failed:', e);
      }
    }
    return null;
  }

  function mapTrendItems(items, sourceLabel) {
    const investmentFiltered = items.filter(item => {
      const keyword = stripHtml(item.title || '');
      const desc = stripHtml(item.description || '');
      return isStronglyInvestmentRelated(keyword, desc);
    });
    // 投資関連を優先しつつ、常に3件表示するため残りを補完
    const nonFiltered = items.filter(item => !investmentFiltered.includes(item));
    const candidates = [...investmentFiltered, ...nonFiltered].slice(0, 3);
    return candidates.map(item => {
      const keyword = stripHtml(item.title || '');
      return {
        title: '🔥 ' + keyword,
        body: (() => { const t = stripHtml(item.description || '').trim(); if (t.length < 5) return `「${keyword}」がGoogleトレンドで急上昇中です。`; return t.length > 220 ? t.slice(0, 220) + '…' : t; })(),
        url: `https://x.com/search?q=${encodeURIComponent(keyword)}&src=trend_click`,
        source: sourceLabel
      };
    });
  }

  // Google Trendsを試みる（2 URL × 4プロキシ）
  for (const rssUrl of rssUrls) {
    const result = await tryFetchRss(rssUrl, 'Google Trends Japan', mapTrendItems);
    if (result) return result;
  }

  // フォールバック: Yahoo Japan 経済ニュース
  const yahooNewsResult = await tryFetchRss(
    'https://news.yahoo.co.jp/rss/topics/business.xml',
    'Yahoo Japan 経済ニュース',
    (items) => items.slice(0, 3).map(item => {
      const title = stripHtml(item.title || '');
      return {
        title: '📰 ' + title,
        body: (() => { const t = stripHtml(item.description || ''); return t.length > 220 ? t.slice(0, 220) + '…' : t; })(),
        url: item.link || `https://news.yahoo.co.jp/topics/business`,
        linkLabel: 'ニュースを見る',
        source: 'Yahoo Japan 経済ニュース'
      };
    })
  );
  if (yahooNewsResult) return yahooNewsResult;

  return null;
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');

  try {
    const [
      btcData, solData, forexRate, nasdaqData, goldData,
      fundWorldData, fundSP500Data, fundTracersSP500Data, fundTracersNasdaqData,
      newsData, trendsData
    ] = await Promise.all([
      fetchCryptoPrice('BTCUSDT'),
      fetchCryptoPrice('SOLUSDT'),
      fetchForexRate(),
      fetchYahooFinance('^NDX'),
      fetchYahooFinance('GC=F'),
      fetchFundNAV('0331418A'),  // eMAXIS Slim 全世界株式(除く日本)
      fetchFundNAV('0331319B'),  // eMAXIS Slim S&P500
      fetchFundNAV('9I311179'),  // Tracers S&P500ゴールドプラス
      fetchFundNAV('9I311188'),  // Tracers NASDAQ100ゴールドプラス
      fetchLatestNews(),
      fetchLatestTrends()
    ]);

    if (btcData) {
      const btc = ASSETS.find(a => a.id === 'btcusdt');
      btc.prevPrice = btcData.prevPrice;
      btc.price = btcData.price;
      btc.note = '暗号資産（リアルタイム）';
    }
    if (solData) {
      const sol = ASSETS.find(a => a.id === 'solusdt');
      sol.prevPrice = solData.prevPrice;
      sol.price = solData.price;
      sol.note = '暗号資産（リアルタイム）';
    }
    if (forexRate) {
      const usd = ASSETS.find(a => a.id === 'usdjpy');
      usd.prevPrice = usd.price;
      usd.price = forexRate;
      usd.note = 'リアルタイム為替レート（更新済）';
    }
    if (nasdaqData) {
      const ndx = ASSETS.find(a => a.id === 'nasdaq100');
      ndx.price = nasdaqData.price;
      ndx.prevPrice = nasdaqData.prevPrice;
      ndx.note = 'NASDAQ 100（Yahoo Finance リアルタイム）';
    }
    if (goldData) {
      const gold = ASSETS.find(a => a.id === 'gold');
      gold.price = goldData.price;
      gold.prevPrice = goldData.prevPrice;
      gold.note = 'スポット価格（Yahoo Finance リアルタイム）';
    }
    [
      { data: fundWorldData,        id: 'emaxis_world' },
      { data: fundSP500Data,        id: 'emaxis_sp500' },
      { data: fundTracersSP500Data, id: 'tracers_sp500gold' },
      { data: fundTracersNasdaqData,id: 'tracers_nasdaqgold' },
    ].forEach(({ data, id }) => {
      if (!data) return;
      const asset = ASSETS.find(a => a.id === id);
      asset.price = data.price;
      if (data.prevPrice !== null) asset.prevPrice = data.prevPrice;
      asset.note = '基準価額（Yahoo!ファイナンス）';
    });
    NEWS_ITEMS = newsData || [];
    TREND_ITEMS = trendsData || [];
  } catch (e) {
    console.warn('Refresh error:', e);
  }

  renderPrices();
  renderNews();
  renderTrends();
  updateTimestamp();

  btn.classList.remove('loading');
}

function showLoading(gridId, label) {
  document.getElementById(gridId).innerHTML =
    `<div style="color:var(--muted);padding:20px;grid-column:1/-1;">📡 ${label}を取得中...</div>`;
}

async function init() {
  renderPrices();
  showLoading('newsGrid', '最新ニュース');
  showLoading('trendGrid', 'トレンド');
  updateTimestamp();
  await refreshAll();
}

init();
</script>
